<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nam Hải Oracle v2 – Trí Tuệ Đa Tầng</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; font-family:sans-serif; background:#0d0d0d; color:#fff; text-align:center; padding:15px; }
        input, select, button, textarea { padding:10px; margin:5px; border-radius:6px; border:none; font-size:16px; background: #222; color: #fff; }
        textarea { width: 90%; max-width: 500px; height: 150px; border: 1px solid #444; -webkit-user-select: auto; user-select: auto; line-height: 1.5; }
        button { background:#ffcc00; color:#000; font-weight:bold; cursor:pointer; width: 45%; max-width: 240px; }
        .result-card { margin:10px; padding:12px; border:1px solid #444; border-radius:12px; background: #1a1a1a; }
        .card-img { width:90px; transition:0.3s; min-height: 140px; background: #222; border-radius: 4px; display: inline-block; }
        .rev { transform:rotate(180deg); }
        .hidden { display:none; }
        .lock { border:2px solid #ffcc00; background: #111; padding: 20px; }
        #final { white-space:pre-wrap; margin-top:20px; text-align:left; line-height:1.8; font-size:17px; max-width:500px; margin:auto; color: #f0f0f0; }
        h2 { color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.5); }
    </style>
</head>
<body oncontextmenu="return false;"> 
    <h2>🔮 Nam Hải Oracle</h2>
    <input id="name" placeholder="Họ và tên" style="width: 90%; max-width: 500px;"><br>
    
    <textarea id="question" maxlength="3000" placeholder="Kể chi tiết câu chuyện của bạn (tối đa 3000 chữ). Càng thật lòng, Tiên sinh phán càng 'đau'..."></textarea><br>

    <div style="margin-bottom: 10px;">
        <input id="day" type="number" placeholder="Ngày" style="width: 60px;">
        <input id="month" type="number" placeholder="Tháng" style="width: 60px;">
        <input id="year" type="number" placeholder="Năm sinh" style="width: 80px;">
    </div>
    
    <select id="topic" style="width: 45%;">
        <option value="love">Tình cảm</option>
        <option value="work">Công việc</option>
        <option value="money">Tiền bạc/Đất đai</option>
        <option value="mind">Nội tâm</option>
    </select>
    <select id="state" style="width: 45%;">
        <option value="pre">Sắp quyết định</option>
        <option value="hesitate">Đang do dự</option>
        <option value="after">Đã quyết định</option>
    </select><br>

    <button onclick="startDraw()">Bắt đầu trải bài 🎵</button>
    <button onclick="toggleMusic()">🔊/🔇</button>
    <button onclick="resetApp()" style="background: #444; color: #ccc; width: 92%; max-width: 500px;">🔄 Làm mới quẻ</button>

    <div id="results"></div>
    <div id="final"></div>
    <button id="copyBtn" class="hidden" style="width: 90%; max-width: 500px;" onclick="copyText()">📋 Sao chép lời phán</button>
    <div id="paywall" class="hidden"></div>
    
    <audio id="bgm" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg">
    </audio>

<script>
    /* LỚP GIÁP BẢO MẬT */
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };

    const cards = [
        {n:"Kẻ Khờ",m:"muốn thử cái mới nhưng chưa có kế hoạch",r:"đang đi sai hướng nhưng cố chấp không quay đầu"},
        {n:"Pháp Sư",m:"tỏ ra mình vẫn kiểm soát tốt mọi thứ",r:"đang bị người khác dắt mũi hoặc thao túng"},
        {n:"Nữ Tư Tế",m:"linh tính thấy bất thường nhưng chưa dám tin",r:"đang cố lờ đi dấu hiệu bản thân thấy rõ"},
        {n:"Hoàng Hậu",m:"mải mê hưởng thụ mà quên mục tiêu",r:"để sự phụ thuộc lấn át lý trí"},
        {n:"Hoàng Đế",m:"gồng mình giữ cái tôi",r:"đuối sức vì gánh vác quá nhiều"},
        {n:"Giáo Hoàng",m:"đi theo lối mòn cũ",r:"làm việc ngược giá trị bản thân"},
        {n:"Người Tình",m:"lòng không yên, đứng núi này trông núi nọ",r:"mâu thuẫn nội tâm gây mất ngủ"},
        {n:"Cỗ Xe",m:"nôn nóng kết quả",r:"mất phương hướng dễ nổi nóng"},
        {n:"Sức Mạnh",m:"ngậm đắng nuốt cay giữ hòa khí",r:"cảm xúc bộc phát làm hỏng việc"},
        {n:"Ẩn Sĩ",m:"nghĩ nhiều nhưng không nói",r:"tự làm khổ mình trong cô độc"},
        {n:"Bánh Xe",m:"thay đổi nhanh không kịp thích nghi",r:"trắc trở liên tục"},
        {n:"Công Lý",m:"tính toán quá khô khan",r:"thấy mình chịu thiệt vô lý"},
        {n:"Treo Ngược",m:"kẹt trong bế tắc",r:"hy sinh cho thứ không xứng"},
        {n:"Cái Chết",m:"từ bỏ cái cũ",r:"níu kéo thứ đã hết"},
        {n:"Tiết Độ",m:"gượng ép giữ thăng bằng",r:"đánh mất điềm tĩnh"},
        {n:"Ác Quỷ",m:"bị ham muốn làm mờ lý trí",r:"muốn thoát khỏi ràng buộc"},
        {n:"Tòa Tháp",m:"nền tảng lung lay",r:"trì hoãn cú sốc phải đối mặt"},
        {n:"Ng ngôi Sao",m:"chờ phép màu hơn hành động",r:"mất sạch niềm tin"},
        {n:"Mặt Trăng",m:"lo sợ kịch bản tự vẽ ra",r:"sự thật sắp lộ diện"},
        {n:"Mặt Trời",m:"quá tự tin dẫn đến chủ quan",r:"ngủ quên trên chiến thắng"},
        {n:"Phán Xét",m:"đối mặt hậu quả việc cũ",r:"trốn tránh sai lầm"},
        {n:"Thế Giới",m:"đạt giới hạn muốn dừng lại",r:"dở dang không trọn vẹn"}
    ];

    let picked=[], step=0;
    let locked = localStorage.getItem("namhai_seen") === "1";

    function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}
    function lifeNumber(d,m,y){
        if(!d||!m||!y) return null;
        let s=(d+""+m+""+y).split("").reduce((a,b)=>a+parseInt(b),0);
        while(s>9){s=s.toString().split("").reduce((x,y)=>x+parseInt(y),0)}
        return s;
    }

    function startDraw(){
        let n=document.getElementById("name").value.trim();
        let q=document.getElementById("question").value.trim();
        if(!n || q.length < 15){alert("Tiên sinh cần bạn thành tâm kể rõ câu chuyện hơn (ít nhất 15 ký tự)!"); return;}
        if(locked){ alert("Quẻ hôm nay đã định. Hãy mở khóa hoặc quay lại vào ngày mai."); return; }
        
        document.getElementById("bgm").play().catch(()=>{});
        step=0;
        picked=shuffle([...Array(22).keys()]).slice(0,5).map(i=>({id:i,rev:Math.random()<0.5}));
        document.getElementById("results").innerHTML="";
        document.getElementById("final").innerHTML="";
        showNext();
    }

    function showNext(){
        if(step<5){
            let r=["Quá khứ","Hiện tại","Nút thắt","Hành động","Hậu quả"];
            let p=picked[step];
            let url=`https://www.sacred-texts.com/tarot/pkt/img/ar${p.id<10?'0'+p.id:p.id}.jpg`;
            document.getElementById("results").innerHTML+=`<div class="result-card"><b>${r[step]}</b><br><img class="card-img ${p.rev?'rev':''}" src="${url}"><br>${cards[p.id].n}<br>${step<4?`<button onclick="showNext()">Lật lá tiếp theo</button>`:`<button onclick="finish()">Tiên sinh kết quẻ</button>`}</div>`;
            step++; window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
        }
    }

    function finish(){
        const name=document.getElementById("name").value;
        const q=document.getElementById("question").value.toLowerCase();
        const num=lifeNumber(parseInt(document.getElementById("day").value), parseInt(document.getElementById("month").value), parseInt(document.getElementById("year").value));
        const mgs = picked.map(p => p.rev ? cards[p.id].r : cards[p.id].m);

        // BỘ NÃO PHÂN TÍCH CHI TIẾT (ANALYSER)
        let deepInsight = "";
        if(q.includes("quay lại") || q.includes("người yêu cũ")) deepInsight = "Bạn hỏi về sự tái hợp, nhưng thực tế bạn đang tiếc công sức mình đã bỏ ra nhiều hơn là tiếc con người đó.";
        else if(q.includes("tiền") || q.includes("nợ") || q.includes("đất")) deepInsight = "Trong chuyện tiền bạc này, cái u mê lớn nhất của bạn là tin vào những lời hứa hẹn không có cơ sở pháp lý.";
        else if(q.includes("nghỉ") || q.includes("việc") || q.includes("sếp")) deepInsight = "Bạn định rời đi vì tự ái cá nhân hay vì sự nghiệp thực sự? Đừng để cái tôi dẫn dắt lúc này.";
        else deepInsight = "Câu chuyện của bạn cho thấy một sự mâu thuẫn lớn giữa điều bạn muốn và điều bạn đang làm hàng ngày.";

        let s = `👉 ${name}, hãy ngồi xuống và nghe Tiên sinh đọc vị câu chuyện của bạn.\n\n`;
        s += `⚠️ **Trọng điểm u mê:** ${deepInsight}\n\n`;
        s += `📍 **Dòng chảy năng lượng:** Bạn xuất phát từ việc ${mgs[0]}, dẫn đến hiện trạng ${mgs[1]}. Cái 'nút thắt' khiến bạn mất ngủ chính là việc bạn ${mgs[2]}.\n\n`;
        s += `💡 **Lời khuyên xương máu:** Bạn đang cố ${mgs[3]}, nhưng nếu không tỉnh táo, hậu quả cuối cùng sẽ là ${mgs[4]}.\n\n`;
        
        if(num) s += `✨ **Thần số học (Số ${num}):** Với bản tính của người mang số ${num}, bạn thường ${num==7?'quá đa nghi':num==8?'quá tham vọng':num==4?'quá cứng nhắc':'dễ bị cảm xúc chi phối'}. Hãy dùng lý trí để bóc tách 3000 chữ bạn vừa kể.\n\n`;
        s += `👉 **Lời chốt hạ:** Bạn kể rất nhiều, nhưng sự thật duy nhất bạn đang trốn tránh là...`;

        let i=0; let el=document.getElementById("final"); el.innerHTML="";
        let timer=setInterval(()=>{
            el.innerHTML += (s[i]==="\n"?"<br>":s[i]); i++;
            if(i>=s.length*0.7) { 
                clearInterval(timer);
                document.getElementById("paywall").classList.remove("hidden");
                document.getElementById("paywall").innerHTML=`<div class="result-card lock"><p>🔒 Tiên sinh đã thấy 'điểm mù' trong 3000 chữ của bạn. Nhập mã NAMHAI để nhận nốt 30% sự thật còn lại.</p><input id="code" style="width:120px" placeholder="Mã..."><button onclick="unlock('${encodeURIComponent(s)}')">Mở khóa</button></div>`;
            }
        },30);
        localStorage.setItem("namhai_seen","1");
    }

    function unlock(full){
        if(document.getElementById("code").value==="NAMHAI"){
            document.getElementById("final").innerHTML = decodeURIComponent(full).replace(/\n/g,"<br>");
            document.getElementById("paywall").classList.add("hidden");
            document.getElementById("copyBtn").classList.remove("hidden");
        } else alert("Mã không đúng, chất xám của Tiên sinh không dành cho người thiếu thành ý!");
    }

    function toggleMusic(){ let m=document.getElementById("bgm"); m.paused?m.play():m.pause(); }
    function copyText(){ navigator.clipboard.writeText(document.getElementById("final").innerText); alert("Đã sao chép!"); }
    function resetApp(){ localStorage.clear(); location.reload(); }
</script>
</body>
</html>
